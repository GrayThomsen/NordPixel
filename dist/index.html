<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="NordPixel - Teknologiforståelse undervisning til folkeskoler" />
    <title>NordPixel - Teknologiforståelse for folkeskolen</title>
    
    <!-- Favicons for dark/light mode -->
    <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" id="favicon" />
    <script type="module" crossorigin src="/assets/index-srMrU7Rm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DPaRt9cw.css">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Favicon switcher -->
    <script>
      function updateFavicon() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const favicon = document.getElementById('favicon');
        favicon.href = isDark ? '/favicon-dark.svg' : '/favicon-light.svg';
      }
      
      // Initial load
      updateFavicon();
      
      // Listen for changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
  </body>
</html>
